[project]
name = "mcp-base"
version = "0.1.0"
description = "Hello World Streamlit app structured with Clean Architecture 4 layers."
requires-python = ">=3.12"
dependencies = [
    "streamlit>=1.0",
    "PyMySQL>=1.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
    "src/domain",
    "src/usecase",
    "src/interface_adapter",
    "src/infrastructure",
]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
# pycodestyle の整形系ルール（E1xx/E2xx/E3xx）は ruff format に委ね二重指摘を避ける。
# formatter と衝突しない論理系サブセット（E4/E7/E9）＋pyflakes（F）＋import 整列（I）に限定する。
select = ["E4", "E7", "E9", "F", "I"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
