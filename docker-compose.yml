# MySQL（db）+ Streamlit アプリ（app）を一括起動する構成。
# app は db のヘルスチェック成功後に起動し、MySQL の greetings テーブルを CRUD する。
#
# 資格情報は本ファイルに直書きせず、.env から補間する（平文秘匿の追跡を避ける）。
# db のパスワードは ${VAR:?...} で必須化し、未設定なら全 compose コマンドを即エラーに
# する（.env の用意を促す fail-fast）。app/tooling 側はリテラル既定を置かず参照のみ。
# 非秘匿の項目（USER/DATABASE/HOST/PORT）は ${VAR:-default} でローカル既定を許容する。
# 利用前に `cp .env.example .env` を実行すること。
services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:? .env に MYSQL_ROOT_PASSWORD を設定してください}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app_db}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:? .env に MYSQL_PASSWORD を設定してください}
    ports:
      # ホスト側は既存 MySQL との衝突回避のため 3307。コンテナ間は db:3306 で通信する。
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # コンテナ内に注入された root パスワードで疎通確認する（$$ は compose 上のエスケープ）。
      test:
        ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      # dev 依存を含まない非 root の本番ステージを使う。
      target: production
    environment:
      MYSQL_HOST: ${MYSQL_HOST:-db}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-app}
      # db 側の :? で .env を強制済みのため、ここはリテラル既定を置かず参照のみ。
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app_db}
      # 認証ゲート（OAuth2 / Google）の設定。管理者 Email は infrastructure 設定クラスが
      # 直接読み（fail-fast の対象、AC-1）、OAUTH_* は entrypoint（render-secrets.sh）が
      # .streamlit/secrets.toml の [auth] へレンダリングして Streamlit が読む（方式 A / D-6）。
      # ここでは :? による必須化を使わない。:? は compose ファイル全体の変数補間段階で
      # 評価されるため、独立して動くべき tooling サービス（make test/lint/fmt が使用）まで
      # 認証 env 未設定で巻き添え停止してしまう。アプリ起動時の fail-fast（AC-1）は
      # AuthConfig.from_env() が空文字を検出して ConfigError を投げることで担保されるため、
      # compose 側は :- で空既定にして app 以外のコマンドを妨げない（未設定なら app は起動時に落ちる）。
      AUTH_ADMIN_EMAIL: ${AUTH_ADMIN_EMAIL:-}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
      OAUTH_COOKIE_SECRET: ${OAUTH_COOKIE_SECRET:-}
      # redirect_uri は秘匿でなくローカル既定の利便性が勝るため未設定時はフォールバック。
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-http://localhost:8501/oauth2callback}
      # 予期せぬ例外時にスタックトレースを画面表示しない（情報露出抑止）
      STREAMLIT_CLIENT_SHOW_ERROR_DETAILS: none
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Streamlit の死活エンドポイントを叩く。curl 不在の slim イメージのため python で確認。
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=3).status==200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # fmt/lint/test を実行するツール専用イメージ（ruff/pytest/mypy 等を含む dev ステージ）。
  # profiles を付けて通常の `docker compose up` からは除外し、make の各ターゲットの
  # `docker compose run` からのみ起動する。ソースは実行時に bind mount する。
  # 統合テスト（make test-integration）では --no-deps を外して db を起動・待機する。
  tooling:
    build:
      context: .
      target: dev
    profiles: ["tooling"]
    environment:
      MYSQL_HOST: ${MYSQL_HOST:-db}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app_db}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
